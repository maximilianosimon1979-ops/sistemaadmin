<title>Sistema Administrativo Contable</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;color:#222;background:#f0f2f5;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#1a3a5c;color:#fff;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.tb-title{font-size:15px;font-weight:700}
.tb-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.15);border-radius:20px;padding:3px 11px;font-size:11px}
.chip-ipc{background:rgba(249,200,78,.28);color:#ffd97a}
.chip-save{background:rgba(30,107,58,.5);color:#a7f3c0;font-weight:700}
.bsm{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:5px;padding:4px 11px;font-size:11px;cursor:pointer}
.bsm:hover{background:rgba(255,255,255,.2)}
.navrow{background:#fff;border-bottom:2px solid #e0e6ed;padding:0 18px;display:flex;gap:0;overflow-x:auto;flex-shrink:0}
.nt{padding:10px 15px;font-size:12px;font-weight:700;cursor:pointer;color:#666;border-bottom:2.5px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .15s}
.nt.on{color:#2e6da4;border-bottom-color:#2e6da4}
.nt:hover:not(.on){color:#333}
.content{flex:1;padding:16px 18px;overflow:auto}
.card{background:#fff;border:1px solid #dde3ea;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.card-gold{border:2px solid #f9c84e}
.card-red{border:2px solid #f5b7b1}
.card-blue{border:2px solid #85b7eb}
.card-green{border:2px solid #a7d7b8}
.ct{font-size:13px;font-weight:700;color:#1a3a5c;margin-bottom:11px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin-bottom:12px}
.met{background:#f7f9fc;border:1px solid #e0e6ed;border-radius:8px;padding:10px 12px;text-align:center}
.ml{font-size:11px;color:#666;margin-bottom:4px}
.mv{font-size:18px;font-weight:700;line-height:1.2}
.ms{font-size:10px;color:#888;margin-top:3px}
.mv.pos{color:#1e6b3a}.mv.neg{color:#c0392b}.mv.warn{color:#b45309}.mv.info{color:#2e6da4}
.g2{display:grid;grid-template-columns:minmax(0,340px) minmax(0,1fr);gap:12px}
.g22{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:11px;font-weight:700;color:#1a3a5c}
.fg select,.fg input,.fg textarea{font-size:13px;padding:8px 11px;border:1.5px solid #cdd5de;border-radius:8px;background:#fff;color:#222;font-family:inherit;width:100%}
.fg select:focus,.fg input:focus,.fg textarea:focus{outline:none;border-color:#2e6da4;box-shadow:0 0 0 3px rgba(46,109,164,.1)}
.fg textarea{resize:vertical;min-height:52px}
.inp-monto{font-size:16px!important;padding:10px 14px!important;font-weight:700!important;letter-spacing:.02em!important}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fa{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97)}
.bs{background:#1e6b3a;color:#fff}.bs:hover{opacity:.88}
.bp{background:#2e6da4;color:#fff}.bp:hover{opacity:.88}
.bw{background:#b45309;color:#fff}.bw:hover{opacity:.88}
.bd{background:#c0392b;color:#fff}.bd:hover{opacity:.88}
.bo{background:#f0f2f5;color:#555;border:1px solid #cdd5de}.bo:hover{background:#e4e8ed}
.bprint{background:#7d3c98;color:#fff}.bprint:hover{opacity:.88}
.tbl-w{overflow-x:auto;border-radius:8px;border:1px solid #dde3ea}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1a3a5c;color:#fff;padding:7px 10px;text-align:left;font-weight:700;font-size:11px;white-space:nowrap}
td{padding:6px 10px;border-bottom:1px solid #eef1f5;color:#222;font-size:12px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f5f8fc}
.tr-tot td{font-weight:700;background:#eef3f9;border-top:2px solid #cdd5de}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.be{background:#e8f4fd;color:#1a5276}.bo2{background:#f0f0f0;color:#555}
.rub{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.r0{background:#e8f4fd;color:#1a5276}.r1{background:#eaf7f0;color:#1e6b3a}
.r2{background:#fef9ec;color:#b45309}.r3{background:#fdf0ee;color:#c0392b}
.r4{background:#f5eef8;color:#7d3c98}
.filters{display:flex;gap:8px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{font-size:12px;padding:6px 9px;border:1.5px solid #cdd5de;border-radius:7px;background:#fff;color:#222;font-family:inherit}
/* ALERTAS */
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:10px;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;border-left:4px solid}
.aok{background:#eaf7f0;color:#1e6b3a;border-color:#1e6b3a}
.ainf{background:#e8f4fd;color:#1a5276;border-color:#2e6da4}
.awarn{background:#fef9ec;color:#b45309;border-color:#f9c84e}
.aerr{background:#fdf0ee;color:#c0392b;border-color:#c0392b}
/* TOAST — aviso flotante */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;opacity:0;transition:opacity .3s;pointer-events:none;max-width:380px;line-height:1.4}
#toast.show{opacity:1}
#toast.tok{background:#1e6b3a}
#toast.terr{background:#c0392b}
#toast.twarn{background:#b45309}
.inc-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 0;border-bottom:1px solid #eef1f5}
.inc-row:last-child{border-bottom:none}
.sep{height:1px;background:#eef1f5;margin:11px 0}
.ipc-tag{display:inline-flex;align-items:center;gap:4px;background:#fef9ec;color:#b45309;border:1px solid #f9c84e;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:700}
.auto-b{background:#e8f4fd;color:#1a5276;border:1px solid #85b7eb;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700}
.real-b{background:#eaf7f0;color:#1e6b3a;border:1px solid #a7d7b8;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700}
.proy-b{background:#fef9ec;color:#b45309;border:1px solid #f9c84e;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700}
.warn-pill{background:#fef9ec;color:#b45309;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;display:inline-block}
.ok-pill{background:#eaf7f0;color:#1e6b3a;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;display:inline-block}
.scen-tab{padding:6px 13px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid #cdd5de;color:#666;background:#f7f9fc}
.scen-tab.on{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.formula-block{background:#f7f9fc;border-radius:10px;padding:13px 15px;margin-bottom:10px;border:1px solid #e0e6ed}
.proy-box{background:#f7f9fc;border-left:4px solid #ccc;border-radius:0 8px 8px 0;padding:11px 14px;margin-bottom:9px}
.dup-warn{background:#fdf0ee;border:1.5px solid #c0392b;border-radius:8px;padding:10px 14px;font-size:12px;color:#c0392b;font-weight:700;margin-top:6px;display:none}
@media print{
  .topbar,.navrow,.no-print{display:none!important}
  .content{padding:0}
  .card{border:1px solid #ccc;page-break-inside:avoid;margin-bottom:8px}
  body{background:#fff}
  .btn{display:none!important}
}
.print-btn-wrap{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
</style>
</head>

const fmt=n=>Math.round(n||0).toLocaleString('es-AR');

const rNms=()=>DB.rubros.filter(x=>x.activo).map(x=>x.n);
const rCls=r=>{const i=rNms().indexOf(r);return'r'+(i>=0?i:0);}
const totI=(m,a)=>DB.ingresos.filter(x=>(!m||x.mes==m)&&(!a||x.anio==a)).reduce((s,x)=>s+x.imp+x.iva,0);
const totE=(m,a)=>DB.egresos.filter(x=>(!m||x.mes==m)&&(!a||x.anio==a)).reduce((s,x)=>s+x.monto,0);
const totER=(r,a)=>DB.egresos.filter(x=>x.rub===r&&(!a||x.anio==a)).reduce((s,x)=>s+x.monto,0);
function iPI(a){return Math.round((totI(0,a)||totI(0,2026))*(1+DB.ipc/100));}
function iPER(r,a){const d=DB.ajustes[r]||{pct:0,manual:0};if(d.manual>0)return d.manual;const p=d.pct>0?d.pct:DB.ipc;return Math.round((totER(r,a)||totER(r,2026))*(1+p/100));}
function iPET(a){return rNms().reduce((s,r)=>s+iPER(r,a),0);}

// ── TOAST NOTIFICATIONS ────────────────────────────────
let toastTimer=null;
function toast(msg,type='tok'){
  const t=$('toast');
  if(toastTimer)clearTimeout(toastTimer);
  t.textContent=msg;
  t.className='show '+type;
  toastTimer=setTimeout(()=>{t.className='';},3500);
}

// ── CHIP "GUARDADO" ────────────────────────────────────
let saveTimer=null;
function showSaved(){
  const s=$('tb-save');if(!s)return;
  s.style.display='inline-block';
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{s.style.display='none';},2500);
}

// ── SERIALIZAR DB DENTRO DEL HTML ─────────────────────
// Los datos SE GUARDAN en el script var DB = {...} del propio HTML.
// Al descargar, el HTML lleva los datos incrustados.
// localStorage es solo un cache adicional.
function serializeDB(){
  try{localStorage.setItem('sist_db',JSON.stringify(DB));}catch(e){}
  showSaved();
}

// Al cargar: intentar restaurar desde localStorage si hay datos más nuevos
(function initDB(){
  try{
    const s=localStorage.getItem('sist_db');
    if(s){
      const p=JSON.parse(s);
      // Solo usar localStorage si tiene MÁS registros (datos más recientes)
      if((p.ingresos&&p.ingresos.length>DB.ingresos.length)||
         (p.egresos&&p.egresos.length>DB.egresos.length)||
         (p.clientes&&p.clientes.length>DB.clientes.length)){
        Object.assign(DB,p);
      }
    }
  }catch(e){}
  rNms().forEach(r=>{if(!DB.ajustes[r])DB.ajustes[r]={pct:0,manual:0};});
})();

function syncChips(){$('tb-anio').textContent='Año: '+anio;$('tb-ipc').textContent='IPC próx.: '+DB.ipc+'%';}
function killCH(){Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}});CH={};}
function goTab(t){
  tab=t;killCH();$('MC').innerHTML='';
  document.querySelectorAll('.nt').forEach((el,i)=>{
    el.classList.toggle('on',['dashboard','ingresos','egresos','clientes','presupuesto','proyecciones','informes','basedatos','exportar'][i]===t);
  });
  ({dashboard:rDash,ingresos:rIng,egresos:rEgr,clientes:rCli,presupuesto:rPres,proyecciones:rProy,informes:rInf,basedatos:rBase,exportar:rExp})[t]();
}
function cambiarAnio(){anio=parseInt($('sel-anio').value);syncChips();goTab(tab);}

function filtIng(){
  const a=anio,m=parseInt($('fi-fm')?.value)||0,p=$('fi-fp')?.value||'';

  $('tbl-ing').innerHTML=`<div class="tbl-w"><table><thead><tr><th>Empresa</th><th>Prod.</th><th>Importe real</th><th>IVA</th><th>Total</th><th>Mes</th></tr></thead>

function guardarIng(){
  const c=parseInt($('fi-cl').value),imp=parseFloat($('fi-im').value)||0,iva=parseFloat($('fi-iv').value)||0,fec=$('fi-fe').value;

  const d=new Date(fec);
  DB.ingresos.push({id:DB.nI++,cli:c,prod:$('fi-po').value,imp,iva,fecha:fec,mes:d.getMonth()+1,anio:d.getFullYear(),obs:$('fi-ob').value});
  serializeDB();
  toast('✔ Ingreso guardado. Proyección '+(anio+1)+' actualizada.','tok');
  filtIng();
  limpIng();
}
function limpIng(){['fi-im','fi-iv','fi-ob'].forEach(id=>{const el=$(id);if(el)el.value=''});}

function chkDupCli(){
  const n=($('fc-n')?.value||'').trim().toUpperCase();

  const d=$('fc-dup'),btn=$('btn-guardar-cli');
  if(dup&&n){
    d.style.display='block';
    d.textContent='⚠ "'+dup.n+'" ya está cargado en el sistema. No se puede duplicar.';
    btn.disabled=true;btn.style.opacity='.5';

  }

function filtCli(){
  const q=($('fc-s')?.value||'').toLowerCase(),t=$('fc-ft')?.value||'';

  $('tbl-cli').innerHTML=`<div class="tbl-w"><table><thead><tr><th>Empresa</th><th>Tipo</th><th>CUIT</th><th>Fact. real total</th><th>Proy. ${anio+1}</th></tr></thead>

function guardarCli(){
  const n=$('fc-n').value.trim();
  if(!n){toast('El nombre es obligatorio','terr');return;}
  if(DB.clientes.find(c=>c.n.toUpperCase()===n.toUpperCase())){

  DB.clientes.push({id:DB.nC++,n:n.toUpperCase(),t:$('fc-t').value,cuit:$('fc-c').value,email:$('fc-e').value,tel:$('fc-tel').value});

function limpCli(){['fc-n','fc-c','fc-e','fc-tel'].forEach(id=>{const el=$(id);if(el)el.value=''});chkDupCli();}

function chkDupRub(){
  const n=($('nr-n')?.value||'').trim().toUpperCase();
  const d=$('nr-dup'),b=$('btn-nr');
  const dup=DB.rubros.find(r=>r.n.toUpperCase()===n);
  if(dup&&n){d.style.display='block';d.textContent='⚠ El rubro "'+dup.n+'" ya existe en el sistema.';b.disabled=true;b.style.opacity='.5';}
  else{d.style.display='none';b.disabled=false;b.style.opacity='1';}
}
function chkDupProd(){
  const n=($('np-n')?.value||'').trim().toUpperCase();
  const d=$('np-dup'),b=$('btn-np');
  const dup=DB.productos.find(p=>p.n.toUpperCase()===n);
  if(dup&&n){d.style.display='block';d.textContent='⚠ El producto "'+dup.n+'" ya existe en el sistema.';b.disabled=true;b.style.opacity='.5';}
  else{d.style.display='none';b.disabled=false;b.style.opacity='1';}
}
function chkDupTipo(){
  const rubId=parseInt($('nt-rub')?.value),n=($('nt-n')?.value||'').trim().toUpperCase();
  const d=$('nt-dup'),b=$('btn-nt');
  const dup=DB.tiposGasto.find(t=>t.rubId===rubId&&t.n.toUpperCase()===n);
  if(dup&&n){d.style.display='block';d.textContent='⚠ "'+dup.n+'" ya existe en ese rubro.';b.disabled=true;b.style.opacity='.5';}
  else{d.style.display='none';b.disabled=false;b.style.opacity='1';}
}
function agregarRubro(){
  const n=($('nr-n')?.value||'').trim().toUpperCase();
  if(!n){toast('Ingresá un nombre para el rubro','terr');return;}
  if(DB.rubros.find(r=>r.n.toUpperCase()===n)){toast('⚠ El rubro "'+n+'" ya existe en el sistema','terr');return;}
  DB.rubros.push({id:DB.nR++,n,activo:true});
  DB.ajustes[n]={pct:0,manual:0};
  serializeDB();
  toast('✔ Rubro "'+n+'" agregado correctamente','tok');
  rBase();
}
function agregarProd(){
  const n=($('np-n')?.value||'').trim().toUpperCase();
  if(!n){toast('Ingresá un nombre para el producto','terr');return;}
  if(DB.productos.find(p=>p.n.toUpperCase()===n)){toast('⚠ El producto "'+n+'" ya existe en el sistema','terr');return;}
  DB.productos.push({id:DB.nP++,n});
  serializeDB();
  toast('✔ Producto "'+n+'" agregado correctamente','tok');
  rBase();
}
function agregarTipo(){
  const rubId=parseInt($('nt-rub')?.value),n=($('nt-n')?.value||'').trim().toUpperCase();
  if(!n){toast('Ingresá el nombre del tipo de gasto','terr');return;}
  if(DB.tiposGasto.find(t=>t.rubId===rubId&&t.n.toUpperCase()===n)){toast('⚠ Ese tipo de gasto ya existe en ese rubro','terr');return;}
  DB.tiposGasto.push({id:DB.nT++,rubId,n});
  serializeDB();
  toast('✔ Tipo de gasto "'+n+'" agregado correctamente','tok');
  rBase();
}
function expJSON(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='backup_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function impJSON(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const p=JSON.parse(e.target.result);
      Object.assign(DB,p);
      rNms().forEach(r=>{if(!DB.ajustes[r])DB.ajustes[r]={pct:0,manual:0};});
      serializeDB();
      toast('✔ Base restaurada correctamente desde backup JSON','tok');
      setTimeout(()=>rBase(),1000);
    }catch(err){toast('Error al importar — el archivo no es válido','terr');}
  };
  r.readAsText(f);
}

// DESCARGA HTML CON DATOS INCRUSTADOS
// ═══════════════════════════════════════
function descargarHTML(){
  // Serializar el DB actual dentro del código fuente del HTML
  const html=document.documentElement.outerHTML;
  // Reemplazar el bloque var DB = {...}; con los datos actuales
  const dbStr='var DB = '+JSON.stringify(DB)+';';
  const updated=html.replace(/var DB = \{[\s\S]*?\};/,dbStr);
  const blob=new Blob([updated],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='SistemaAdmin_'+anio+'_'+new Date().toISOString().slice(0,10)+'.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('✔ Sistema descargado con todos los datos incluidos','tok');
}

function expCSV(tipo){
  let csv='',nombre='';
  if(tipo==='ingresos'){
    csv='Empresa,Producto,Importe,IVA,Total,Fecha,Mes,Año\n';
    DB.ingresos.forEach(r=>{csv+=`"${gCli(r.cli)}","${r.prod||''}",${r.imp},${r.iva},${r.imp+r.iva},${r.fecha},${r.mes},${r.anio}\n`;});
    nombre='ingresos_'+anio+'.csv';
  }else if(tipo==='egresos'){
    csv='Rubro,Tipo de Gasto,Monto,Fecha,Mes,Año\n';
    DB.egresos.forEach(r=>{csv+=`"${r.rub}","${r.tipo}",${r.monto},${r.fecha},${r.mes},${r.anio}\n`;});
    nombre='egresos_'+anio+'.csv';
  }else{
    const ap=anio+1;
    csv='Concepto,Real '+anio+',Estimado '+ap+',IPC %\n';
    csv+=`"TOTAL INGRESOS",${totI(0,anio)||totI(0,2026)},${iPI(anio)},${DB.ipc}%\n`;
    rNms().forEach(r=>{const b=totER(r,anio)||totER(r,2026),f=iPER(r,anio),p=(DB.ajustes[r]||{}).pct>0?(DB.ajustes[r]).pct:DB.ipc;csv+=`"${r}",${b},${f},${p}%\n`;});
    csv+=`"TOTAL EGRESOS",${totE(0,anio)||totE(0,2026)},${iPET(anio)},${DB.ipc}%\n`;
    nombre='proyeccion_'+ap+'.csv';
  }
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=nombre;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
